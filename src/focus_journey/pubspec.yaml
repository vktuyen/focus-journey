name: focus_journey
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.9

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  shared_preferences: ^2.5.5
  window_manager: ^0.5.1
  tray_manager: ^0.5.3
  # Display GEOMETRY only (visible screen bounds), to clamp the compact PiP back
  # onto a visible screen (mini-window AC-8). Already pulled transitively by
  # window_manager and privacy-cleared in activity-detection (NFR-5); declared
  # directly so the explicit import isn't a transitive-dependency lint.
  screen_retriever: ^0.2.0
  flame: ^1.35.1
  launch_at_startup: ^0.5.1
  local_notifier: ^0.1.6
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  integration_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Journey scene art (Kenney, CC0). See assets/CREDITS.md for per-file
  # provenance. Flame's image cache is rooted at assets/journey/ via the game's
  # images.prefix (see JourneyAssets.assetPrefix).
  assets:
    - assets/journey/vehicles/
    # Vehicle-picker per-mode icons (vehicle-picker AC-14/AC-15). One distinct
    # flat single-colour glyph per TravelMode (walk/run/bicycle/motorbike/car/
    # ship) for the picker UI — NOT the in-scene side-view sprites under
    # vehicles/. game-icons.net glyphs (CC BY 3.0; same family as the cockpit
    # glyphs), recoloured to journey slate #2D3142, transparent bg. Every file
    # attributed in assets/CREDITS.md.
    - assets/journey/vehicle_icons/
    # Richer scenery set (journey-scene-v2 #11; re-sourced wholesale by
    # journey-scene-art-v3 #/AC-3). All CC0 / original-flat license-clean
    # sprites; every file recorded in assets/CREDITS.md. Flutter asset directory
    # entries are NON-recursive, so each scenery leaf dir is listed. (The v1
    # `objects/` dir was retired in the art-v3 wholesale re-source — AC-3.)
    - assets/journey/scenery/mountains/
    - assets/journey/scenery/forest/
    - assets/journey/scenery/countryside/
    - assets/journey/scenery/city/
    - assets/journey/scenery/sky/
    # Beach/coast far band (journey-scene-art-v3 / AC-5; net-new).
    - assets/journey/scenery/beach/
    # Side-view full-body animals (journey-scene-art-v3 / AC-6; net-new pooled
    # kinds in the spawn rotation).
    - assets/journey/animals/
    - assets/journey/people/
    # First-person cockpit glyphs (journey-pov). Stylized-flat, license-clean
    # CC BY 3.0 glyphs (Delapouite, game-icons.net) recoloured to the journey
    # palette; every file recorded in assets/CREDITS.md (AC-17). NON-recursive
    # asset dirs, so each leaf cockpit dir is listed.
    - assets/journey/cockpit/car/
    - assets/journey/cockpit/motorbike/
    # Tray / menu-bar icon variants (mini-window slice). Sourced by
    # ui-asset-curator via /source-assets (expected: tray_active.png,
    # tray_paused.png). Until present the tray degrades gracefully to a
    # tooltip-only presence. Declared proactively so the path is wired.
    - assets/tray/
    # Offline base map of Vietnam. CURRENT: vietnam_provinces_2025[_base].svg —
    # the 34 provincial units after the 1 July 2025 merger (CC BY-SA 3.0, TUBS/
    # PIkne; attribution REQUIRED — see assets/CREDITS.md). Same equirectangular
    # location-map frame + georeferencing bounds as before. The pre-2025
    # 63-province files (vietnam_provinces[_base].svg) are retained but SUPERSEDED
    # (historical). See CREDITS.md for bounds/projection used to place overlays.
    # Only the runtime GeoJSON is bundled — the source SVGs in assets/map/ (input
    # to tool/svg_to_geojson.py) stay in the repo but are kept OUT of the app
    # bundle to avoid ~2.7 MB of dead weight (map-bundle-weight, 2026-07-15).
    - assets/map/vietnam_provinces_2025.geojson

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
